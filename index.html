<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Munya 🦎</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
overflow-y:auto;
background:#0d0500;
padding:30px 0;
}

/* INTRO */

.intro{
position:fixed;
width:100%;
height:100%;
background:#0d0500;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
flex-direction:column;
color:white;
}

.envelope{
font-size:60px;
cursor:pointer;
transition:.3s;
}

.envelope:hover{transform:scale(1.1)}

/* GALAXY */

.galaxy{
position:fixed;
width:150%;
height:150%;
top:-25%;
left:-25%;
background:
radial-gradient(circle at 20% 30%, rgba(255,120,0,.7), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(255,80,0,.6), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,200,120,.5), transparent 40%),
linear-gradient(120deg,#0f0c29,#302b63,#ff7b00);
animation:moveGalaxy 18s infinite alternate ease-in-out;
z-index:-3;
}

@keyframes moveGalaxy{
0%{transform:translate(0,0) scale(1)}
100%{transform:translate(-60px,-40px) scale(1.15)}
}

/* EXTRA GLOW BACKGROUND */

.glow-bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%, rgba(255,120,0,.2), transparent 60%),
radial-gradient(circle at 70% 70%, rgba(255,180,100,.2), transparent 60%);
z-index:-2;
filter:blur(80px);
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.stars::after{
content:"";
position:absolute;
width:2px;
height:2px;
background:white;
box-shadow:
100px 200px white,
200px 300px white,
300px 150px white,
400px 350px white,
500px 250px white,
600px 100px white,
700px 300px white,
800px 200px white,
900px 400px white,
1000px 150px white,
1200px 250px white,
1400px 100px white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* CARD */

.card{
width:90%;
max-width:460px;
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 40px 80px rgba(0,0,0,.4);
position:relative;
z-index:2;
opacity:0;
transform:translateY(30px);
transition:1s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

/* PHOTO FIX */

.photo-slider{
width:100%;
height:220px;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
position:relative;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

.photo-slider img{
max-width:100%;
max-height:100%;
position:absolute;
opacity:0;
transition:opacity 1s;
}

.photo-slider img.active{
opacity:1;
}

/* TEXT */

.message{
margin-top:10px;
color:#555;
line-height:1.6;
font-size:15px;
min-height:220px;
white-space:pre-line;
}

/* BUTTON */

button{
margin-top:15px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#FFA500;
color:white;
cursor:pointer;
font-weight:600;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff8c00;
}

/* SECRET */

.secret{
display:none;
margin-top:20px;
background:#fff3e6;
padding:15px;
border-radius:10px;
font-weight:600;
color:#FFA500;
}

/* CONFETTI */

.confetti{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div id="intro" class="intro">
<div class="envelope" onclick="openLetter()">💌</div>
<p>Klik untuk buka surat</p>
</div>

<div class="galaxy"></div>
<div class="glow-bg"></div>
<div class="stars"></div>

<div class="card">

<div class="photo-slider">
<img src="foto1.jpg.jpeg" class="active">
<img src="foto2.jpg.jpeg">
<img src="foto3.jpg.jpeg">
</div>

<h1 style="color:#e67e22">Happy Birthday Munya!</h1>

<p class="message" id="letter"></p>

<button onclick="showSecret()">Pesan Rahasia</button>

<div class="secret" id="secret">
Sebenernya ada banyak hal yang pengen aku bilang, tapi ya… mungkin belum waktunya.
</div>

</div>

<script>

function openLetter(){
document.getElementById("intro").style.display="none"
document.querySelector(".card").classList.add("show")
}

/* CONFETTI */

function confetti(){
let c=document.createElement("div")
c.className="confetti"

let colors=["#ffd700","#ff9a6a","#ffffff","#e67e22"]

c.style.background=colors[Math.floor(Math.random()*colors.length)]
c.style.left=Math.random()*100+"vw"

let dur=Math.random()*3+3
c.style.animationDuration=dur+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),dur*1000)
}

for(let i=0;i<80;i++)confetti()

/* SECRET */

function showSecret(){
let s=document.getElementById("secret")
s.style.display=s.style.display==="block"?"none":"block"
}

/* TYPE */

const text=`Selamat ulang tahun ya, Munyaa 🎂🤍

Semoga ke depan hidup kamu lebih ringan,
dan lebih banyak hal baik yang kamu temuin.

Makasih ya… udah jadi bagian dari banyak hal,
yang mungkin ga selalu keliatan,
tapi kerasa.

Aku cuma pengen kamu bahagia.

Dan entah kenapa,
dari sekian banyak hal…
kamu tetap jadi salah satu yang sulit diganti 😄s`

let i=0

function typeLetter(){
let el=document.getElementById("letter")
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typeLetter,35)
}
}

typeLetter()

/* SLIDER */

let slideIndex=0

function slidePhotos(){
let slides=document.querySelectorAll(".photo-slider img")
slides.forEach(img=>img.classList.remove("active"))

slideIndex++
if(slideIndex >= slides.length){
slideIndex = 0
}

slides[slideIndex].classList.add("active")
}

setInterval(slidePhotos,3000)

</script>

</body>
</html>

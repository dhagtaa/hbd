<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Munya 🦎</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
background:#0d0500;
padding:30px 0;
overflow-x:hidden;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:10;
}

.envelope{
font-size:60px;
cursor:pointer;
transition:.3s;
}
.envelope:hover{transform:scale(1.1)}

/* GALAXY */
.galaxy{
position:fixed;
width:150%;
height:150%;
top:-25%;
left:-25%;
background:
radial-gradient(circle at 20% 30%, rgba(255,120,0,.7), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(255,80,0,.6), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,200,120,.5), transparent 40%),
linear-gradient(120deg,#0f0c29,#302b63,#ff7b00);
animation:moveGalaxy 18s infinite alternate ease-in-out;
z-index:-3;
}

@keyframes moveGalaxy{
0%{transform:translate(0,0) scale(1)}
100%{transform:translate(-60px,-40px) scale(1.15)}
}

/* GLOW */
.glow-bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%, rgba(255,120,0,.2), transparent 60%),
radial-gradient(circle at 70% 70%, rgba(255,180,100,.2), transparent 60%);
z-index:-2;
filter:blur(80px);
}

/* ⭐ FULL STARS */
.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(2px 2px at 20% 30%, white, transparent),
radial-gradient(1px 1px at 50% 70%, white, transparent),
radial-gradient(2px 2px at 80% 90%, white, transparent),
radial-gradient(1px 1px at 10% 80%, white, transparent),
radial-gradient(2px 2px at 70% 40%, white, transparent),
radial-gradient(1px 1px at 30% 60%, white, transparent),
radial-gradient(2px 2px at 90% 20%, white, transparent),
radial-gradient(1px 1px at 40% 90%, white, transparent);
background-repeat:repeat;
background-size:400px 400px;
animation:twinkleMove 20s linear infinite;
}

/* layer tambahan */
.stars::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(1px 1px at 25% 20%, white, transparent),
radial-gradient(1px 1px at 60% 80%, white, transparent),
radial-gradient(2px 2px at 80% 50%, white, transparent);
background-size:300px 300px;
animation:twinkleMove 30s linear infinite;
}

@keyframes twinkleMove{
0%{background-position:0 0}
100%{background-position:400px 400px}
}

/* CARD */
.card{
width:90%;
max-width:460px;
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 40px 80px rgba(0,0,0,.4);
opacity:0;
transform:translateY(30px);
transition:1s;
}
.card.show{
opacity:1;
transform:translateY(0);
}

/* SLIDER */
.photo-slider{
width:100%;
height:220px;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
position:relative;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.photo-slider img{
position:absolute;
max-width:100%;
max-height:100%;
opacity:0;
transition:opacity 1s;
}

.photo-slider img.active{
opacity:1;
}

/* TEXT */
.message{
margin-top:10px;
color:#555;
line-height:1.6;
font-size:15px;
min-height:220px;
white-space:pre-line;
}

/* BUTTON */
button{
margin-top:15px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#FFA500;
color:white;
cursor:pointer;
font-weight:600;
transition:.3s;
}
button:hover{
transform:scale(1.05);
background:#ff8c00;
}

/* SECRET */
.secret{
display:none;
margin-top:20px;
background:#fff3e6;
padding:15px;
border-radius:10px;
font-weight:600;
color:#FFA500;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="galaxy"></div>
<div class="glow-bg"></div>
<div class="stars"></div>

<!-- INTRO -->
<div id="intro" class="intro">
<div class="envelope" onclick="openLetter()">💌</div>
<p>Klik untuk buka surat</p>
</div>

<!-- CARD -->
<div class="card" id="card">

<div class="photo-slider" id="slider">
<img src="https://res.cloudinary.com/dhwtdxvl1/image/upload/v1774967691/foto1.jpg_bbzyyx.jpg" class="active">
<img src="https://res.cloudinary.com/dhwtdxvl1/image/upload/v1774967690/foto2.jpg_rasw6z.jpg">
<img src="https://res.cloudinary.com/dhwtdxvl1/image/upload/v1774967690/foto3.jpg_jjidvk.jpg">
</div>

<h1 style="color:#e67e22">Happy Birthday Munya!</h1>

<p class="message" id="letter"></p>

<button onclick="toggleSecret()">Pesan Rahasia</button>

<div class="secret" id="secret">
Sebenernya ada banyak hal yang pengen aku bilang, tapi ya… mungkin belum waktunya.
</div>

</div>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="sound.mp3  " type="audio/mpeg">
</audio>

<script>

/* OPEN */
function openLetter(){
document.getElementById("intro").style.display="none"
document.getElementById("card").classList.add("show")

let music = document.getElementById("bgm")
music.volume = 0
music.play()

let fade = setInterval(()=>{
if(music.volume < 1){
music.volume += 0.05
}else{
clearInterval(fade)
}
},200)
}

/* SLIDER */
let slides = document.querySelectorAll("#slider img")
let index = 0

function slidePhotos(){
slides[index].classList.remove("active")
index = (index + 1) % slides.length
slides[index].classList.add("active")
}
setInterval(slidePhotos,3000)

/* SECRET */
function toggleSecret(){
let s=document.getElementById("secret")
s.style.display = s.style.display === "block" ? "none" : "block"
}

/* TYPE */
const text=`Selamat ulang tahun ya, Munyaa 🎂🤍

Semoga ke depan hidup kamu lebih ringan,
dan lebih banyak hal baik yang kamu temuin.

Makasih ya… udah jadi bagian dari banyak hal,
yang mungkin ga selalu keliatan,
tapi kerasa.

Terima kasih juga udah bikin hidup aku lebih berwarna,
dan udah banyak nemenin aku sejauh ini.

Dan entah kenapa,
dari sekian banyak hal…
kamu tetap jadi salah satu yang sulit diganti 😄`

let i=0
function typeLetter(){
let el=document.getElementById("letter")
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typeLetter,35)
}
}
typeLetter()

</script>

</body>
</html>
